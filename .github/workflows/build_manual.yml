name: Build APK (Manual)

# ─────────────────────────────────────────────
#  Cómo usar este workflow
# ─────────────────────────────────────────────
#  1. Ve a tu repo en GitHub → pestaña "Actions"
#  2. Selecciona "Build APK (Manual)" en la barra izquierda
#  3. Click en "Run workflow" → elige la rama y la variante
#  4. Espera ~10 min y descarga el APK desde la sección "Artifacts"
#
#  Secrets requeridos en Settings → Secrets → Actions:
#    KEYSTORE          → tu keystore en base64: base64 -w0 my.keystore
#    KEY_ALIAS         → alias de la clave dentro del keystore
#    KEYSTORE_PASSWORD → contraseña del keystore
#    KEY_PASSWORD      → contraseña de la clave
#    GRADLE_CACHE_KEY  → cualquier string aleatorio (p.ej. "metrolist-cache-1")
#
#  Secrets opcionales (para Last.fm scrobbling):
#    LASTFM_API_KEY
#    LASTFM_SECRET
# ─────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variante a compilar"
        required: true
        default: "foss"
        type: choice
        options:
          - foss
          - gms
      build_type:
        description: "Tipo de build"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
      app_name:
        description: "Nombre de la app (aparece en el launcher)"
        required: false
        default: "Metrolist"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ inputs.variant }} ${{ inputs.build_type }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-cleanup: on-success

      - name: Setup and generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Capitaliza la variante para Gradle (foss → Foss, gms → Gms) ──
      - name: Resolve Gradle task name
        id: task
        run: |
          VARIANT="${{ inputs.variant }}"
          BUILD_TYPE="${{ inputs.build_type }}"
          VARIANT_CAP="$(echo "${VARIANT:0:1}" | tr '[:lower:]' '[:upper:]')${VARIANT:1}"
          BUILD_TYPE_CAP="$(echo "${BUILD_TYPE:0:1}" | tr '[:lower:]' '[:upper:]')${BUILD_TYPE:1}"
          echo "gradle_task=assemble${VARIANT_CAP}${BUILD_TYPE_CAP}" >> $GITHUB_OUTPUT
          echo "variant_cap=${VARIANT_CAP}" >> $GITHUB_OUTPUT
          echo "Gradle task: assemble${VARIANT_CAP}${BUILD_TYPE_CAP}"

      - name: Build APK
        run: ./gradlew --console=plain ${{ steps.task.outputs.gradle_task }} --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: ${{ inputs.app_name }}
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      # ── Solo firma en release ──
      - name: Sign APK (release only)
        if: inputs.build_type == 'release'
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/${{ inputs.variant }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename and move APK
        id: apk
        run: |
          VARIANT="${{ inputs.variant }}"
          BUILD_TYPE="${{ inputs.build_type }}"
          OUTPUT_DIR="app/build/outputs/apk/${VARIANT}/${BUILD_TYPE}"
          DEST_DIR="${OUTPUT_DIR}/out"
          mkdir -p "$DEST_DIR"

          APP_NAME="${{ inputs.app_name }}"
          SAFE_NAME="${APP_NAME// /-}"

          if [ "$BUILD_TYPE" = "release" ]; then
            # Busca el APK firmado
            SIGNED=$(find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | head -1)
            if [ -z "$SIGNED" ]; then
              echo "❌ No se encontró APK firmado en $OUTPUT_DIR"
              ls -la "$OUTPUT_DIR"
              exit 1
            fi
            TARGET="${SAFE_NAME}-${VARIANT}-release.apk"
            mv "$SIGNED" "$DEST_DIR/$TARGET"
          else
            # Debug: toma cualquier APK
            UNSIGNED=$(find "$OUTPUT_DIR" -name "*.apk" ! -path "*/out/*" | head -1)
            if [ -z "$UNSIGNED" ]; then
              echo "❌ No se encontró APK en $OUTPUT_DIR"
              ls -la "$OUTPUT_DIR"
              exit 1
            fi
            TARGET="${SAFE_NAME}-${VARIANT}-debug.apk"
            mv "$UNSIGNED" "$DEST_DIR/$TARGET"
          fi

          echo "apk_path=$DEST_DIR/$TARGET" >> $GITHUB_OUTPUT
          echo "apk_name=$TARGET" >> $GITHUB_OUTPUT
          echo "✅ APK listo: $TARGET"
          ls -lh "$DEST_DIR/"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 14

      - name: Build summary
        run: |
          echo "## ✅ Build completada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Variante | \`${{ inputs.variant }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tipo | \`${{ inputs.build_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| App name | ${{ inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ steps.apk.outputs.apk_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Descarga el APK desde la sección **Artifacts** de arriba ⬆️" >> $GITHUB_STEP_SUMMARY
