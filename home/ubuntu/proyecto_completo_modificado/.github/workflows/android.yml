name: Build Doey APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # ── Android SDK ───────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle cache ──────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Debug keystore (fijo del repo) ───────────────────────────────────────
      - name: Verify keystore exists
        run: |
          if [ ! -f app/debug.keystore ]; then
            echo "ERROR: debug.keystore no encontrado en el repo"
            exit 1
          fi
          echo "Keystore OK"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Tune JVM for CI
        run: echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: doey-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
